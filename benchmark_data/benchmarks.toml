# TransferHelper hits a "stack too deep" YulException under the IR pipeline.
# Exclude it, plus the script/tests whose codegen would otherwise force it to
# be compiled (type(TransferHelper).creationCode / new TransferHelper).
exclude = [
    "contracts/helpers/TransferHelper.sol",
    "script/TransferHelperDeployer.s.sol",
    "test/foundry/TransferHelperMultipleRecipientsTest.sol",
    "test/foundry/TransferHelperSingleRecipientTest.sol",
]

# solmate has no foundry.toml; re-extraction needs a minimal Forge config added.
